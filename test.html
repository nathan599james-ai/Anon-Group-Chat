<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-Time Chat Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #chat-box { border: 1px solid #ccc; height: 200px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2 id="counter">Users Online: 0</h2>
    
    <div id="chat-box"></div>

    <form id="message-form">
        <input type="text" id="msg-input" placeholder="Type a secret whisper..." required autocomplete="off">
        <button type="submit">Send</button>
    </form>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io("http://localhost:3000");

        // UI Elements
        const counter = document.getElementById('counter');
        const chatBox = document.getElementById('chat-box');
        const messageForm = document.getElementById('message-form');
        const msgInput = document.getElementById('msg-input');

        // 1. Assign character when connected
        socket.on("connect", () => {
            socket.emit("assign_persona", {
                characterName: "Satoru Gojo",
                characterSeries: "Jujutsu Kaisen"
            });
        });

        // 2. Track online user count
        socket.on("online_count", (count) => {
            counter.innerText = `Users Online: ${count}`;
        });

        // 3. Catch historical whispers when first joining
        socket.on("whisper_history", (history) => {
            chatBox.innerHTML = ''; // clear out old content
            history.forEach(appendMessage);
        });

        // 4. Catch brand new whispers coming down the stream
        socket.on("new_whisper", (whisper) => {
            appendMessage(whisper);
        });

        // 5. Submit form to send message to backend
        messageForm.addEventListener('submit', (e) => {
            e.preventDefault();
            socket.emit('send_whisper', {
                text: msgInput.value,
                themeClass: "neon-blue"
            });
            msgInput.value = ''; // Clear text field
        });

        function appendMessage(whisper) {
            const p = document.createElement('p');
            p.innerHTML = `<strong>${whisper.author_character_name}</strong>: ${whisper.content_text}`;
            chatBox.appendChild(p);
            chatBox.scrollTop = chatBox.scrollHeight; // Auto scroll down
        }
    </script>
</body>
</html>
